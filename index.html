<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corazón cinematográfico</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #1b1428;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="lienzo"></canvas>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("lienzo");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TOTAL_BESOS = 1200;

let besos = [];
let besosLluvia = [];
let textoParticulas = [];
let estrellas = [];

let tiempo = 0;
let duracion = 18 * 60;

let iniciado = false;
let finalizado = false;

// 🖼️ imagen beso
const imgBeso = new Image();
imgBeso.src = "beso.png";

// 🎨 tonos rosas
const colores = ["#ff4d6d","#ff6f8e","#ff8fa3","#ffb3c1","#ff758f"];

function colorRandom(){
  return colores[Math.floor(Math.random()*colores.length)];
}

// 🌌 estrellas
function crearEstrellas(){
  for(let i=0;i<200;i++){
    estrellas.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*1.5,
      speed: Math.random()*0.3,
      alpha: Math.random()
    });
  }
}

function dibujarEstrellas(){
  estrellas.forEach(s=>{
    s.x += s.speed;
    if(s.x > canvas.width) s.x = 0;

    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = "#fff";

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ❤️ corazón
function puntoCorazon(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return { x, y };
}

// 💋 beso con COLOR aplicado a PNG
function dibujarBeso(x, y, size, rot=0, alpha=1, color="#ff4d6d") {

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(rot);

  // dibujar imagen
  ctx.drawImage(imgBeso, -size, -size, size*2, size*2);

  // aplicar color encima (multiplicación)
  ctx.globalCompositeOperation = "source-atop";
  ctx.fillStyle = color;
  ctx.fillRect(-size, -size, size*2, size*2);

  ctx.globalCompositeOperation = "source-over";

  ctx.restore();
}

// 💋 crear beso
function crearBeso() {
  const t = Math.random() * Math.PI * 2;
  const p = puntoCorazon(t);

  const escala = Math.min(canvas.width, canvas.height) / 45;
  const r = Math.random();

  return {
    x: canvas.width/2,
    y: canvas.height/2,
    tx: canvas.width/2 + p.x * escala * r,
    ty: canvas.height/2 + p.y * escala * r,
    size: 8 + Math.random()*6,
    alpha: 0,
    color: colorRandom()
  };
}

// 🌧️ lluvia
function crearLluvia() {
  besos.forEach(b => {
    besosLluvia.push({
      x: b.tx,
      y: b.ty,
      vx: Math.random()*2-1,
      vy: Math.random()*3 + 2,
      rot: Math.random()*Math.PI,
      vr: Math.random()*0.1-0.05,
      size: b.size,
      color: b.color
    });
  });
}

// ✨ texto partículas
function crearTextoParticulas() {
  const temp = document.createElement("canvas");
  const tctx = temp.getContext("2d");

  temp.width = 700;
  temp.height = 300;

  tctx.fillStyle = "white";
  tctx.font = "bold 60px sans-serif";

  tctx.fillText("365 besos", 20, 120);
  tctx.fillText("para curarte", 20, 220);

  const data = tctx.getImageData(0,0,temp.width,temp.height);

  for(let x=0; x<temp.width; x+=4){
    for(let y=0; y<temp.height; y+=4){
      const i = (y*temp.width+x)*4;
      if(data.data[i+3] > 150){
        textoParticulas.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          tx: canvas.width*0.05 + x,
          ty: canvas.height*0.65 + y - 150
        });
      }
    }
  }
}

// 🖱️ click iniciar + musica
window.addEventListener("click", () => {
  if(!iniciado){
    iniciado = true;
    crearEstrellas();

    const musica = document.getElementById("musica");
    musica.volume = 0.6;
    musica.play();
  }
});

// 🌑 vignette
function drawVignette(){
  const g = ctx.createRadialGradient(
    canvas.width/2,
    canvas.height/2,
    100,
    canvas.width/2,
    canvas.height/2,
    canvas.width
  );

  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(1, "rgba(0,0,0,0.7)");

  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ================= LOOP =================
function loop(){
  requestAnimationFrame(loop);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawVignette();
  dibujarEstrellas();

  // TEXTOS (YA NO CRUZAN EL CORAZÓN)
  ctx.fillStyle = "#ffd6e0";
  ctx.font = "bold 50px sans-serif";

  ctx.fillText("365 días", 60, canvas.height * 0.3);
  ctx.fillText("Son:", canvas.width - 200, canvas.height * 0.3);

  if(!iniciado){
    ctx.font = "30px sans-serif";
    ctx.fillText("Haz click para comenzar", canvas.width/2-160, canvas.height/2);
    return;
  }

  if(!finalizado){

    tiempo++;
    let progreso = Math.min(tiempo/duracion, 1);

    if(progreso >= 1){
      finalizado = true;
      crearLluvia();
      crearTextoParticulas();
    }

    let cantidad = Math.floor(TOTAL_BESOS * Math.pow(progreso,2));

    while(besos.length < cantidad){
      besos.push(crearBeso());
    }

    besos.forEach(b=>{
      b.x += (b.tx - b.x)*0.05;
      b.y += (b.ty - b.y)*0.05;
      b.alpha = Math.min(b.alpha + 0.03, 1);

      dibujarBeso(b.x,b.y,b.size,0,b.alpha,b.color);
    });

  } else {

    // corazón fijo
    besos.forEach(b=>{
      dibujarBeso(b.tx,b.ty,b.size,0,1,b.color);
    });

    // lluvia
    besosLluvia.forEach(b=>{
      b.x += b.vx;
      b.y += b.vy;
      b.rot += b.vr;

      dibujarBeso(b.x,b.y,b.size,b.rot,0.9,b.color);
    });

    // texto partículas (lado izquierdo)
    textoParticulas.forEach(p=>{
      p.x += (p.tx - p.x)*0.05;
      p.y += (p.ty - p.y)*0.05;

      ctx.fillStyle = "#ffd6e0";
      ctx.fillRect(p.x,p.y,2,2);
    });
  }
}

loop();
</script>

</body>
</html>
